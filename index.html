// ── PWA: Service Worker (inline via Blob) ─────────────────────
// The SW caches the app shell so it works fully offline.
(function registerSW() {
  if (!('serviceWorker' in navigator)) return;

  const CACHE = 'tiny-bites-v3';

  // Service worker source as a string — runs in its own scope
  const swCode = `
const CACHE_NAME = '${CACHE}';
const OFFLINE_URL = 'offline';

// On install: cache nothing extra (the app is self-contained in the HTML)
self.addEventListener('install', (e) => {
  self.skipWaiting();
});

// On activate: clean old caches
self.addEventListener('activate', (e) => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

// On fetch: cache-first strategy for the app HTML itself
self.addEventListener('fetch', (e) => {
  // Skip non-GET and non-http(s) requests
  if (e.request.method !== 'GET') return;
  if (!e.request.url.startsWith('http')) return;

  // For Anthropic API calls — always go network, never cache
  if (e.request.url.includes('anthropic.com')) {
    return; // let browser handle normally
  }

  e.respondWith(
    caches.open(CACHE_NAME).then(async (cache) => {
      const cached = await cache.match(e.request);
      if (cached) return cached;

      try {
        const response = await fetch(e.request);
        // Cache successful same-origin or CDN responses
        if (response.ok && (response.type === 'basic' || response.type === 'cors')) {
          cache.put(e.request, response.clone());
        }
        return response;
      } catch (err) {
        // Offline fallback: return cached version if available
        const fallback = await cache.match(e.request);
        if (fallback) return fallback;
        // For navigation requests return a simple offline page
        if (e.request.mode === 'navigate') {
          return new Response('<html><body style="font-family:system-ui;text-align:center;padding:4rem"><h2>🍼 Tiny Bites</h2><p>You are offline. Open the app when connected.</p></body></html>', { headers: { 'Content-Type': 'text/html' } });
        }
      }
    })
  );
});

// Listen for skipWaiting message from the update banner
self.addEventListener('message', (e) => {
  if (e.data === 'skipWaiting') self.skipWaiting();
});
`;

  try {
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);

    navigator.serviceWorker.register(swUrl, { scope: './' })
      .then(reg => {
        console.log('[TinyBites] Service worker registered:', reg.scope);

        // Listen for updates
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateBanner();
            }
          });
        });
      })
      .catch(err => console.log('[TinyBites] SW registration failed (normal for file://):', err));

    // Cache the page itself on first load (for offline use)
    window.addEventListener('load', () => {
      if (navigator.serviceWorker.controller) {
        caches.open(CACHE).then(cache => cache.add(window.location.href)).catch(()=>{});
      }
    });

  } catch(e) {
    // Blob URL SW not supported in this context (file://) — silently continue
  }
})();

// ── PWA: Install Prompt (Android Chrome) ─────────────────────
let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  showInstallBanner();
});

window.addEventListener('appinstalled', () => {
  hideInstallBanner();
  deferredInstallPrompt = null;
  toast('Tiny Bites installed! Find it on your home screen 🎉');
});

function showInstallBanner() {
  if (document.getElementById('install-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = `
    position:fixed;bottom:0;left:0;right:0;z-index:9999;
    background:#0F6E56;color:white;
    padding:12px 16px 12px;
    display:flex;align-items:center;gap:12px;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    font-size:14px;box-shadow:0 -2px 16px rgba(0,0,0,0.2);
    padding-bottom:max(12px, env(safe-area-inset-bottom));
  `;
  banner.innerHTML = `
    <div style="font-size:24px;line-height:1;">🍼</div>
    <div style="flex:1;">
      <div style="font-weight:600;font-size:14px;">Install Tiny Bites</div>
      <div style="font-size:12px;opacity:.85;">Add to your home screen for the best experience</div>
    </div>
    <button onclick="installApp()" style="background:white;color:#0F6E56;border:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;">Install</button>
    <button onclick="hideInstallBanner()" style="background:rgba(255,255,255,0.15);color:white;border:none;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;line-height:1;">×</button>
  `;
  document.body.appendChild(banner);

  // Shift main content up so banner doesn't obscure it
  document.querySelector('.shell').style.paddingBottom = '72px';
}

function hideInstallBanner() {
  const b = document.getElementById('install-banner');
  if (b) b.remove();
  const shell = document.querySelector('.shell');
  if (shell) shell.style.paddingBottom = '';
}

async function installApp() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  if (outcome === 'accepted') {
    toast('Installing Tiny Bites…');
  }
  deferredInstallPrompt = null;
  hideInstallBanner();
}

// ── PWA: Update available banner ─────────────────────────────
function showUpdateBanner() {
  if (document.getElementById('update-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'update-banner';
  banner.style.cssText = `
    position:fixed;top:0;left:0;right:0;z-index:9999;
    background:#3C3489;color:white;
    padding:10px 16px;display:flex;align-items:center;gap:10px;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:13px;
  `;
  banner.innerHTML = `
    <div style="flex:1;">✨ A new version of Tiny Bites is available</div>
    <button onclick="applyUpdate()" style="background:white;color:#3C3489;border:none;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;">Update now</button>
    <button onclick="this.parentElement.remove()" style="background:none;border:none;color:white;font-size:16px;cursor:pointer;padding:0 4px;">×</button>
  `;
  document.body.appendChild(banner);
}

function applyUpdate() {
  if (navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage('skipWaiting');
  }
  window.location.reload();
}

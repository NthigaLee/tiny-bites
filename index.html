<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f6f5f1;--bg3:#eeece6;
  --text:#1a1a18;--text2:#666660;--text3:#99998f;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-mid:#5DCAA5;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-mid:#FAC775;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --purple:#3C3489;--purple-bg:#EEEDFE;--purple-mid:#7F77DD;
  --green:#27500A;--green-bg:#EAF3DE;
  --r:8px;--rl:12px;--rxl:16px;
  --shadow:0 1px 4px rgba(0,0,0,0.07),0 0 0 0.5px rgba(0,0,0,0.08);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
  --text:#f0f0ea;--text2:#aaa9a0;--text3:#66665e;
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.18);
  --teal:#5DCAA5;--teal-bg:#04342C;--teal-mid:#1D9E75;
  --amber:#EF9F27;--amber-bg:#412402;--amber-mid:#BA7517;
  --red:#F09595;--red-bg:#501313;
  --purple:#AFA9EC;--purple-bg:#26215C;--purple-mid:#7F77DD;
  --green:#97C459;--green-bg:#173404;
  --shadow:0 1px 4px rgba(0,0,0,0.3),0 0 0 0.5px rgba(255,255,255,0.06);
}}
html{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg2);color:var(--text);font-size:15px;line-height:1.5;}
body{min-height:100vh;min-height:100dvh;}

/* PWA safe area support (iPhone notch / home bar) */
@supports (padding: max(0px)) {
  .sidebar { padding-top: max(0px, env(safe-area-inset-top)); }
  .main { padding-bottom: max(4rem, calc(env(safe-area-inset-bottom) + 2rem)); }
}

/* PWA standalone mode tweaks */
@media (display-mode: standalone) {
  .sidebar-logo { padding-top: max(1.5rem, env(safe-area-inset-top)); }
  html { background: var(--bg); }
}

/* Layout */
.shell{display:flex;min-height:100vh;}
.sidebar{width:240px;flex-shrink:0;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.main{flex:1;min-width:0;padding:2rem 2rem 4rem;}
@media(max-width:720px){
  .shell{flex-direction:column;}
  .sidebar{width:100%;height:auto;position:static;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:0.5px solid var(--border);}
  .sidebar-logo,.nav-section-label{display:none;}
  .nav-item{padding:10px 14px;border-radius:0;border-bottom:2px solid transparent;white-space:nowrap;}
  .nav-item.active{border-bottom-color:var(--teal);background:transparent;color:var(--teal);}
  .main{padding:1.25rem 1rem 3rem;}
  .sidebar-bottom{display:none;}
}

/* Sidebar */
.sidebar-logo{padding:1.5rem 1.25rem 1rem;}
.logo-mark{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.02em;}
.logo-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.ai-status{display:flex;align-items:center;gap:6px;font-size:11px;margin-top:8px;padding:5px 8px;border-radius:var(--r);background:var(--bg2);}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.ai-dot.connected{background:#22c55e;}
.ai-dot.error{background:#ef4444;}
.nav-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:.75rem 1.25rem .25rem;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 1.25rem;font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;}
.nav-item svg{flex-shrink:0;opacity:.7;}
.nav-item:hover{background:var(--bg2);color:var(--text);}
.nav-item.active{background:var(--teal-bg);color:var(--teal);font-weight:500;}
.nav-item.active svg{opacity:1;}
.nav-badge{margin-left:auto;background:var(--teal);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:999px;min-width:18px;text-align:center;}
.sidebar-bottom{margin-top:auto;padding:1rem 1.25rem;border-top:0.5px solid var(--border);}
.age-toggle{display:flex;gap:6px;}
.age-pill{flex:1;text-align:center;font-size:11px;font-weight:500;padding:5px 8px;border-radius:999px;border:1.5px solid var(--border2);cursor:pointer;color:var(--text2);background:var(--bg2);transition:all .12s;}
.age-pill.active-baby{background:var(--teal-bg);border-color:var(--teal-mid);color:var(--teal);}
.age-pill.active-toddler{background:var(--amber-bg);border-color:var(--amber-mid);color:var(--amber);}

/* Page header */
.page-header{margin-bottom:1.5rem;}
.page-title{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.01em;}
.page-sub{font-size:13px;color:var(--text2);margin-top:3px;}

/* API key setup screen */
.setup-wrap{max-width:500px;margin:3rem auto;text-align:center;}
.setup-icon{width:64px;height:64px;border-radius:50%;background:var(--purple-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;}
.setup-title{font-size:20px;font-weight:600;margin-bottom:8px;}
.setup-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:1.5rem;}
.setup-card{background:var(--bg);border-radius:var(--rl);box-shadow:var(--shadow);padding:1.5rem;text-align:left;margin-bottom:1rem;}
.setup-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}
.setup-input{width:100%;padding:10px 12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:14px;font-family:monospace;outline:none;letter-spacing:.04em;}
.setup-input:focus{border-color:var(--teal);}
.setup-hint{font-size:12px;color:var(--text3);margin-top:6px;line-height:1.5;}
.setup-hint a{color:var(--teal);}
.setup-btn{width:100%;padding:12px;border-radius:var(--rl);background:var(--teal);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;margin-top:1rem;transition:opacity .12s;}
.setup-btn:hover{opacity:.9;}
.setup-btn:disabled{opacity:.5;cursor:not-allowed;}
.setup-security{background:var(--bg2);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.5;display:flex;gap:8px;align-items:flex-start;margin-top:8px;}
.setup-security svg{flex-shrink:0;margin-top:1px;}

/* AI Chat panel */
.ai-panel{background:var(--bg);border-radius:var(--rl);box-shadow:var(--shadow);overflow:hidden;margin-bottom:1.25rem;}
.ai-panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--border);background:var(--purple-bg);}
.ai-panel-title{font-size:13px;font-weight:600;color:var(--purple);display:flex;align-items:center;gap:8px;}
.ai-panel-actions{display:flex;gap:6px;}
.ai-btn{font-size:11px;padding:4px 10px;border-radius:999px;border:1px solid var(--purple-mid);background:var(--purple);color:#fff;cursor:pointer;transition:opacity .12s;white-space:nowrap;}
.ai-btn:hover{opacity:.85;}
.ai-btn.outline{background:transparent;color:var(--purple);}
.ai-btn.outline:hover{background:var(--purple-bg);}
.ai-messages{padding:16px;min-height:120px;max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.ai-msg{display:flex;gap:10px;align-items:flex-start;}
.ai-msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;}
.ai-msg-avatar.claude{background:var(--purple);color:#fff;}
.ai-msg-avatar.user{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-mid);}
.ai-msg-bubble{flex:1;font-size:13px;line-height:1.6;color:var(--text);}
.ai-msg-bubble.claude{background:var(--bg2);border-radius:0 var(--rl) var(--rl) var(--rl);padding:10px 14px;}
.ai-msg-bubble.streaming::after{content:'▋';animation:blink .8s infinite;color:var(--purple);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.ai-msg-bubble pre{font-family:inherit;white-space:pre-wrap;font-size:13px;}
.ai-msg-bubble .meal-day{font-weight:600;color:var(--text);margin-top:8px;margin-bottom:2px;font-size:13px;}
.ai-msg-bubble .meal-item{color:var(--text2);font-size:12px;margin-left:8px;margin-bottom:1px;}
.ai-input-row{display:flex;gap:8px;padding:12px 16px;border-top:0.5px solid var(--border);}
.ai-input{flex:1;font-size:13px;padding:8px 12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);outline:none;font-family:inherit;}
.ai-input:focus{border-color:var(--purple-mid);}
.ai-send-btn{padding:8px 16px;border-radius:var(--r);background:var(--purple);color:#fff;border:none;font-size:13px;cursor:pointer;font-weight:500;transition:opacity .12s;white-space:nowrap;}
.ai-send-btn:hover{opacity:.9;}
.ai-send-btn:disabled{opacity:.4;cursor:not-allowed;}

/* Quick action chips */
.quick-chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px 12px;}
.quick-chip{font-size:11px;padding:5px 12px;border-radius:999px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;}
.quick-chip:hover{border-color:var(--purple-mid);color:var(--purple);background:var(--purple-bg);}

/* Thinking indicator */
.thinking{display:flex;gap:4px;align-items:center;padding:10px 14px;background:var(--bg2);border-radius:0 var(--rl) var(--rl) var(--rl);}
.thinking span{width:6px;height:6px;border-radius:50%;background:var(--purple-mid);animation:bounce .6s infinite;}
.thinking span:nth-child(2){animation-delay:.15s;}
.thinking span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Search & filter */
.search-wrap{position:relative;margin-bottom:1.25rem;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);}
.search-input{width:100%;padding:10px 12px 10px 38px;border-radius:var(--rl);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:14px;outline:none;transition:border .15s;}
.search-input:focus{border-color:var(--teal);}
.search-input::placeholder{color:var(--text3);}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 6px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center;}
.filter-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-right:2px;}
.filter-chip{font-size:11px;padding:4px 10px;border-radius:999px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;}
.filter-chip:hover{border-color:var(--teal);color:var(--teal);}
.filter-chip.active-avoid{border-color:#E24B4A;background:var(--red-bg);color:var(--red);}
.filter-chip.active-type{border-color:var(--teal-mid);background:var(--teal-bg);color:var(--teal);}

/* Recipe grid */
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.recipe-card{background:var(--bg);border-radius:var(--rl);box-shadow:var(--shadow);padding:1rem;cursor:pointer;transition:transform .12s,box-shadow .12s;}
.recipe-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,0.10),0 0 0 0.5px rgba(0,0,0,0.08);}
.recipe-card.selected{box-shadow:0 0 0 2px var(--teal),0 4px 14px rgba(0,0,0,0.08);}
.recipe-card.ai-suggested{box-shadow:0 0 0 2px var(--purple-mid),0 4px 14px rgba(0,0,0,0.08);}
.recipe-emoji{font-size:28px;line-height:1;margin-bottom:4px;}
.recipe-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.recipe-card-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;}
.recipe-card-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.recipe-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;}
.tag{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:500;}
.add-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;}
.add-btn:hover{background:var(--teal-bg);border-color:var(--teal);color:var(--teal);}
.add-btn.added{background:var(--teal);border-color:var(--teal);color:#fff;}
.recipe-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-top:6px;}
.recipe-nutrition{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);}
.nutr-item{flex:1;text-align:center;}
.nutr-val{font-size:13px;font-weight:600;color:var(--text);}
.nutr-lbl{font-size:10px;color:var(--text3);}
.no-results{text-align:center;padding:3rem 1rem;color:var(--text2);}

/* Recipe Tabs */
.recipe-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.recipe-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.recipe-tab:hover{border-color:var(--primary);color:var(--primary);}
.recipe-tab.active{background:var(--primary);color:white;border-color:var(--primary);}
.add-recipe-tab{background:var(--teal-bg,#e1f5ee);color:var(--teal,#085041);border-color:transparent;}
.add-recipe-tab:hover{background:var(--primary);color:white;}
/* User Recipe Card */
.user-recipe{border:1.5px solid var(--primary);position:relative;}
.user-recipe-badge{position:absolute;top:8px;right:8px;background:var(--primary);color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.03em;}
/* Preferences select */
.pref-select{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;outline:none;cursor:pointer;}
/* Drag & Drop */
.week-cell.drag-over{outline:2px dashed var(--primary);outline-offset:-2px;background:var(--primary-bg,#e1f5ee) !important;}
.week-cell.draggable-cell{cursor:grab;}
.week-cell.draggable-cell:active{cursor:grabbing;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--bg);border-radius:var(--rxl);width:calc(100% - 2rem);max-width:480px;max-height:90vh;overflow-y:auto;padding:1.5rem;}
.modal-handle{display:none;}
.modal-header{display:flex;gap:14px;align-items:flex-start;margin-bottom:1rem;}
.modal-emoji{font-size:40px;line-height:1;}
.modal-title{font-size:18px;font-weight:600;color:var(--text);}
.modal-sub{font-size:13px;color:var(--text2);margin-top:3px;}
.modal-section{margin-top:1.25rem;}
.modal-section-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:8px;}
.ingredient-list{list-style:none;display:flex;flex-direction:column;gap:6px;}
.ingredient-list li{display:flex;justify-content:space-between;font-size:13px;color:var(--text);padding:6px 0;border-bottom:0.5px solid var(--border);}
.ingredient-list li span{color:var(--text2);}
.step-list{list-style:none;counter-reset:steps;}
.step-list li{counter-increment:steps;display:flex;gap:10px;font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5;}
.step-list li::before{content:counter(steps);min-width:22px;height:22px;border-radius:50%;background:var(--teal-bg);color:var(--teal);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.modal-nutr{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;}
.modal-nutr-card{background:var(--bg2);border-radius:var(--r);padding:8px;text-align:center;}
.modal-add-btn{width:100%;padding:12px;border-radius:var(--rl);background:var(--teal);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;margin-top:1.25rem;transition:opacity .12s;}
.modal-add-btn:hover{opacity:.9;}
.modal-add-btn.added{background:var(--bg2);color:var(--text2);}

/* Shopping */
.shopping-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.export-btns{display:flex;gap:8px;flex-wrap:wrap;}
.export-btn{display:flex;align-items:center;gap:6px;font-size:12px;padding:7px 14px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .12s;font-weight:500;}
.export-btn:hover{background:var(--bg2);color:var(--text);}
.export-btn.keep{border-color:#F9AB00;color:#B06000;}
.export-btn.keep:hover{background:#FFFAEB;}
.export-btn.ios{border-color:#007AFF;color:#0055CC;}
.export-btn.ios:hover{background:#EBF3FF;}
.export-btn.copy{border-color:var(--teal-mid);color:var(--teal);}
.export-btn.copy:hover{background:var(--teal-bg);}
.shop-section{margin-bottom:1.5rem;}
.shop-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid var(--border);}
.shop-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);background:var(--bg);box-shadow:var(--shadow);margin-bottom:6px;cursor:pointer;transition:all .12s;}
.shop-item:hover{background:var(--bg2);}
.shop-item.done{opacity:.5;}
.shop-check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;}
.shop-check.done{background:var(--teal);border-color:var(--teal);}
.shop-item-name{flex:1;font-size:13px;color:var(--text);}
.shop-item.done .shop-item-name{text-decoration:line-through;color:var(--text3);}
.shop-item-qty{font-size:12px;color:var(--text3);}
.shop-item-remove{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 4px;opacity:0;transition:opacity .12s;}
.shop-item:hover .shop-item-remove{opacity:1;}
.selected-recipes-bar{background:var(--bg);border-radius:var(--rl);box-shadow:var(--shadow);padding:12px 14px;margin-bottom:1.25rem;}
.selected-recipe-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--teal-bg);color:var(--teal);border-radius:999px;padding:4px 10px;margin:2px 4px 2px 0;border:1px solid var(--teal-mid);}
.selected-recipe-chip button{background:none;border:none;cursor:pointer;color:var(--teal);font-size:14px;line-height:1;padding:0;}
.empty-shop{text-align:center;padding:3rem 1rem;color:var(--text2);}

/* Preferences */
.pref-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:600px){.pref-grid{grid-template-columns:1fr;}}
.pref-card{background:var(--bg);border-radius:var(--rl);box-shadow:var(--shadow);padding:1.25rem;}
.pref-card-full{grid-column:1/-1;}
.pref-card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;}
.pref-card-sub{font-size:12px;color:var(--text2);margin-bottom:12px;}
.chips-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.pref-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:999px;}
.pref-chip-fav{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-mid);}
.pref-chip-dis{background:var(--red-bg);color:var(--red);border:1px solid #F7C1C1;}
.pref-chip button{background:none;border:none;cursor:pointer;font-size:14px;line-height:1;padding:0;color:inherit;}
.input-row{display:flex;gap:6px;}
.pref-input{flex:1;font-size:13px;padding:8px 10px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);outline:none;}
.pref-input:focus{border-color:var(--teal);}
.pref-textarea{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);resize:vertical;min-height:80px;outline:none;font-family:inherit;}
.pref-textarea:focus{border-color:var(--teal);}
.meal-type-grid{display:flex;flex-wrap:wrap;gap:6px;}
.mt-pill{font-size:12px;padding:5px 12px;border-radius:999px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .12s;}
.mt-pill.active{background:var(--teal-bg);border-color:var(--teal-mid);color:var(--teal);}
.context-box{background:var(--teal-bg);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--teal);line-height:1.6;margin-top:10px;}

/* Nutrition */
.nutr-big-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:1.5rem;}
.nutr-big-card{background:var(--bg);border-radius:var(--rl);box-shadow:var(--shadow);padding:1.25rem;}
.nutr-big-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:4px;}
.nutr-big-val{font-size:28px;font-weight:700;color:var(--text);}
.nutr-big-unit{font-size:13px;font-weight:400;color:var(--text3);}
.nutr-big-target{font-size:11px;color:var(--text3);margin-top:2px;}
.bar-track{background:var(--bg2);border-radius:4px;height:6px;margin-top:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .4s;}
.tips-card{background:var(--bg);border-radius:var(--rl);box-shadow:var(--shadow);padding:1.25rem;margin-bottom:1rem;}
.tips-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px;}
.tip-item{display:flex;gap:8px;font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.5;}
.tip-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:6px;}

/* Week plan — legacy table (kept for fallback) */
.week-grid{overflow-x:auto;}
.week-table{width:100%;border-collapse:separate;border-spacing:3px;min-width:560px;}
.week-th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);padding:6px 8px;text-align:center;}
.week-label{font-size:11px;font-weight:600;padding:6px 8px;white-space:nowrap;}
.week-cell{border-radius:6px;padding:6px 8px;font-size:11px;line-height:1.4;cursor:pointer;transition:opacity .12s;vertical-align:top;}
.week-cell:hover{opacity:.8;}

/* ── NEW Column Planner ────────────────────────────────────────── */
.planner-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px;}
.planner-grid{display:flex;gap:8px;min-width:720px;}
.planner-col{flex:1;min-width:118px;}
.planner-day-head{text-align:center;padding:6px 4px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);}
.planner-day-head strong{display:block;font-size:13px;color:var(--text);letter-spacing:0;font-weight:600;margin-bottom:1px;}
.planner-card{background:var(--bg);border-radius:10px;box-shadow:var(--shadow);padding:9px 9px 26px;margin-bottom:7px;position:relative;border-left:3px solid transparent;transition:transform .13s,box-shadow .13s;}
.planner-card.draggable-cell{cursor:grab;}
.planner-card.draggable-cell:active{cursor:grabbing;}
.planner-card.draggable-cell:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.11);}
.planner-card.draggable-cell:hover .planner-swap{opacity:1;}
.planner-card.drag-over{outline:2px dashed var(--teal);outline-offset:-2px;background:var(--teal-bg) !important;}
.planner-card.dragging{opacity:.35;}
.planner-card.breakfast{border-left-color:#F6A228;}
.planner-card.lunch{border-left-color:var(--teal);}
.planner-card.dinner{border-left-color:#5B5BD6;}
.planner-card.snack{border-left-color:#E84393;}
.planner-card.snack-off{border-left-color:transparent;background:var(--bg2);box-shadow:none;cursor:pointer;opacity:.65;}
.planner-slot-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;gap:3px;}
.planner-slot-label.breakfast{color:#854F0B;}
.planner-slot-label.lunch{color:var(--teal);}
.planner-slot-label.dinner{color:#3C3489;}
.planner-slot-label.snack{color:#C2415A;}
.planner-emoji{font-size:20px;margin-bottom:3px;line-height:1;}
.planner-name{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px;}
.planner-meta{font-size:10px;color:var(--text3);font-family:'DM Sans',sans-serif;}
.planner-empty{font-size:11px;color:var(--text3);padding:10px 0 6px;text-align:center;cursor:pointer;font-family:'DM Sans',sans-serif;}
.planner-empty:hover{color:var(--teal);}
.planner-swap{position:absolute;bottom:5px;right:5px;background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;padding:2px 7px;font-size:9px;color:var(--text2);cursor:pointer;opacity:0;transition:opacity .13s;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.planner-swap:hover{background:var(--teal-bg);color:var(--teal);border-color:var(--teal-mid);}
.planner-actions{position:absolute;top:4px;right:4px;display:flex;gap:1px;}
.planner-btn{background:transparent;border:none;padding:2px 5px;cursor:pointer;font-size:12px;color:var(--text3);opacity:0;transition:opacity .13s;border-radius:4px;}
.planner-card:hover .planner-btn{opacity:.7;}
.planner-btn:hover{opacity:1 !important;background:var(--bg2);}
/* Ingredient tag input */
.ing-tags-wrap{display:flex;flex-wrap:wrap;gap:5px;align-items:center;min-height:38px;padding:6px 10px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);cursor:text;}
.ing-tag{display:flex;align-items:center;gap:3px;background:var(--teal-bg);border:1px solid var(--teal-mid);border-radius:20px;padding:2px 9px;font-size:11px;color:var(--teal);font-family:'DM Sans',sans-serif;}
.ing-tag button{background:none;border:none;cursor:pointer;color:var(--teal);font-size:12px;padding:0;opacity:.7;}
.ing-tag-input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;min-width:120px;flex:1;padding:0;}
.ing-match{background:rgba(246,162,40,.15);color:#854F0B;border:1px solid rgba(246,162,40,.3);font-weight:600;}
/* Meal selector item */
.meal-sel-item{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:var(--bg);margin-bottom:6px;transition:all .13s;}
.meal-sel-item:hover{background:var(--bg2);border-color:var(--teal-mid);}
.meal-sel-item.current{border-color:var(--teal);background:var(--teal-bg);}
.meal-sel-emoji{font-size:26px;flex-shrink:0;margin-top:1px;}
.meal-sel-info{flex:1;min-width:0;}
.meal-sel-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.meal-sel-meta{font-size:11px;color:var(--text2);font-family:'DM Sans',sans-serif;margin-bottom:5px;}
.meal-sel-ings{display:flex;flex-wrap:wrap;gap:3px;}
.meal-sel-ing{font-size:10px;padding:1px 7px;border-radius:20px;background:var(--bg2);color:var(--text3);font-family:'DM Sans',sans-serif;}
.meal-sel-ing.matched{background:rgba(246,162,40,.15);color:#854F0B;border:1px solid rgba(246,162,40,.25);font-weight:600;}
@media(max-width:719px){
  .planner-grid{min-width:560px;}
  .planner-col{min-width:100px;}
  .planner-card{padding:7px 7px 24px;}
  .planner-name{font-size:10px;}
  .planner-emoji{font-size:18px;}
}

/* Shared */
.btn{font-size:13px;padding:8px 16px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;transition:all .12s;font-family:inherit;}
.btn:hover{background:var(--bg2);}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal);}
.btn-teal:hover{opacity:.9;}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple);}
.btn-purple:hover{opacity:.9;}
.section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px;flex-wrap:wrap;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:999px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.divider{height:0.5px;background:var(--border);margin:1.25rem 0;}

/* ── MOBILE-FIRST OPTIMIZATION ─────────────────────────────────────── */

/* Mobile Header */
.mobile-header{display:none;position:fixed;top:0;left:0;right:0;height:52px;background:var(--bg);border-bottom:0.5px solid var(--border);z-index:90;align-items:center;justify-content:space-between;padding:0 12px;padding-top:env(safe-area-inset-top);gap:8px;}
.mobile-header-title{font-size:17px;font-weight:700;color:var(--text);flex:1;text-align:center;letter-spacing:-.01em;}
.mobile-header-spacer{width:40px;}

/* Hamburger Button */
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;width:40px;height:40px;flex-shrink:0;align-items:center;justify-content:center;border-radius:8px;}
.hamburger span{display:block;width:20px;height:2px;background:var(--text);margin:4px 0;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);transform-origin:center;}
.hamburger:active{background:var(--bg2);}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translateY(8px);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translateY(-8px);}

/* Navigation Drawer Overlay */
.nav-drawer-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:99;opacity:0;transition:opacity 0.3s ease;}
.nav-drawer-overlay.open{display:block;opacity:1;}

/* Sidebar as Drawer on Mobile */
.sidebar{transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);will-change:transform;}

/* ── BOTTOM TAB BAR ─────────────────────────────────────────── */
.bottom-tab-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--bg);border-top:0.5px solid var(--border);padding-bottom:env(safe-area-inset-bottom);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);}
.bottom-tab-bar-inner{display:flex;align-items:stretch;height:56px;}
.bottom-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;background:none;border:none;padding:6px 4px 2px;color:var(--text3);font-family:inherit;transition:color .15s;position:relative;-webkit-tap-highlight-color:transparent;}
.bottom-tab:active{background:var(--bg2);}
.bottom-tab.active{color:var(--teal);}
.bottom-tab svg{width:22px;height:22px;flex-shrink:0;}
.bottom-tab-label{font-size:10px;font-weight:600;letter-spacing:.01em;white-space:nowrap;}
.bottom-tab-badge{position:absolute;top:4px;right:calc(50% - 14px);background:var(--teal);color:#fff;font-size:9px;font-weight:700;padding:1px 4px;border-radius:999px;min-width:14px;text-align:center;line-height:14px;}
.bottom-more-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;background:none;border:none;padding:6px 4px 2px;color:var(--text3);font-family:inherit;-webkit-tap-highlight-color:transparent;}
.bottom-more-tab:active{background:var(--bg2);}
.bottom-more-tab-label{font-size:10px;font-weight:600;letter-spacing:.01em;}

/* Mobile (<720px) */
@media(max-width:719px){
  .mobile-header{display:flex;}
  .hamburger{display:flex;}
  .nav-drawer-overlay{display:block;}
  .bottom-tab-bar{display:block;}

  .sidebar{position:fixed;left:0;top:0;bottom:0;width:80vw;max-width:300px;transform:translateX(-100%);z-index:100;border-right:0.5px solid var(--border);padding-top:max(12px,env(safe-area-inset-top));overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:4px 0 24px rgba(0,0,0,.18);}
  .sidebar.open{transform:translateX(0);}

  .shell{display:flex;flex-direction:column;}
  /* top: mobile header (52px+safe-area), bottom: tab bar (56px+safe-area) */
  .main{
    padding-top:calc(52px + env(safe-area-inset-top));
    padding-left:1rem;
    padding-right:1rem;
    padding-bottom:calc(56px + env(safe-area-inset-bottom) + 1rem);
  }

  /* Larger touch targets */
  .nav-item{height:52px;padding:14px 16px;font-size:14px;}

  /* Recipe grid: 1 col on small, 2 col on larger phones */
  .recipe-grid{grid-template-columns:1fr;}

  /* Input optimization - prevent zoom on iOS */
  .search-input,.pref-input,.setup-input,.ai-input{height:44px;padding:12px;font-size:16px !important;}

  /* Filter chips */
  .filter-chip{min-height:36px;padding:8px 12px;}

  /* Modal: slide up from bottom */
  .modal{max-height:92vh;padding:20px 16px;border-bottom-left-radius:0;border-bottom-right-radius:0;width:100%;max-width:100%;margin-top:auto;}
  .modal-overlay{align-items:flex-end;}
  .modal-handle{display:block;margin-bottom:16px;}

  /* Button sizing */
  .btn{padding:14px 18px;font-size:15px;}
  .add-btn{width:40px;height:40px;min-width:40px;}

  /* Card adjustments */
  .recipe-card{padding:0.875rem;}
  .recipe-emoji{font-size:28px;}

  /* Section row on mobile */
  .section-row{flex-direction:column;align-items:flex-start;}
  .section-row>*:last-child{align-self:flex-end;}

  /* Toast higher so it clears bottom bar */
  .toast{bottom:calc(56px + env(safe-area-inset-bottom) + 1rem);}

  /* Shopping header wrap */
  .shopping-header{flex-direction:column;align-items:flex-start;}
  .export-btns{width:100%;justify-content:flex-start;}

  /* Planner scroll on mobile */
  .planner-scroll{margin:0 -1rem;padding:0 1rem 8px;}
}

/* Small phones (320-479px) */
@media(max-width:479px){
  .sidebar{width:85vw;max-width:280px;}
  .recipe-card-name{font-size:14px;}
  .recipe-card-meta{font-size:11px;}
  .page-title{font-size:20px;}
  .page-sub{font-size:12px;}
}

/* Medium phones (480-719px): 2-col recipe grid */
@media(min-width:480px) and (max-width:719px){
  .recipe-grid{grid-template-columns:repeat(2,1fr);}
}

/* Tablet & above (≥720px) - Show desktop sidebar */
@media(min-width:720px){
  .mobile-header{display:none !important;}
  .hamburger{display:none !important;}
  .nav-drawer-overlay{display:none !important;}
  .bottom-tab-bar{display:none !important;}

  .sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;transform:translateX(0) !important;overflow-y:auto;border-right:0.5px solid var(--border);}
  .sidebar.open{transform:translateX(0) !important;}

  .shell{display:flex;}
  .main{padding-left:256px;padding-right:1.5rem;padding-top:1.5rem;padding-bottom:max(1.5rem,env(safe-area-inset-bottom));}

  .nav-item{height:auto;padding:8px 14px;}
  .recipe-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));}
}

/* Large tablets (1024px+) */
@media(min-width:1024px){
  .recipe-grid{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));}
  .main{padding-left:256px;padding-right:2rem;}
}

/* Safe area support */
@supports(padding:max(0px)){
  .sidebar{padding-bottom:env(safe-area-inset-bottom);}
}

/* ── BABY COLOR THEMES ─────────────────────────────────────────── */

/* Theme Color Transitions */
*{transition:color 0.2s ease,background-color 0.2s ease,border-color 0.2s ease;}

/* Baby Blue Theme (Default) */
:root[data-theme="baby-blue"],
:root {
  --primary: #0D7A69;
  --primary-bg: #C5E9E5;
  --primary-mid: #5B9C96;
  --teal: #0D7A69;
  --teal-bg: #C5E9E5;
  --teal-mid: #5B9C96;
  /* Blue-tinted page surfaces */
  --bg:#FAFEFF;--bg2:#E4F2FC;--bg3:#D0E8F8;
}

/* Baby Pink Theme */
:root[data-theme="baby-pink"] {
  --primary: #D97A94;
  --primary-bg: #FDE8EE;
  --primary-mid: #E8B4C8;
  --teal: #D97A94;
  --teal-bg: #FDE8EE;
  --teal-mid: #E8B4C8;
  --bg:#FFFAFE;--bg2:#FCEEF4;--bg3:#F8DFE8;
}

/* Baby Orange Theme */
:root[data-theme="baby-orange"] {
  --primary: #E8995A;
  --primary-bg: #FFF0E6;
  --primary-mid: #F0B88A;
  --teal: #E8995A;
  --teal-bg: #FFF0E6;
  --teal-mid: #F0B88A;
  --bg:#FFFCFA;--bg2:#FDF0E6;--bg3:#FAE4D0;
}

/* Baby Green Theme */
:root[data-theme="baby-green"] {
  --primary: #5FBD9A;
  --primary-bg: #E8F6F1;
  --primary-mid: #8FD4B4;
  --teal: #5FBD9A;
  --teal-bg: #E8F6F1;
  --teal-mid: #8FD4B4;
  --bg:#FAFFFD;--bg2:#E6F7F0;--bg3:#D2EFE4;
}

/* Baby Purple Theme */
:root[data-theme="baby-purple"] {
  --primary: #B89FD9;
  --primary-bg: #F3EFFE;
  --primary-mid: #D4BFED;
  --teal: #B89FD9;
  --teal-bg: #F3EFFE;
  --teal-mid: #D4BFED;
  --bg:#FDFAFF;--bg2:#F0EAFD;--bg3:#E5D9FA;
}

/* Baby Yellow Theme */
:root[data-theme="baby-yellow"] {
  --primary: #E8C85A;
  --primary-bg: #FFFDE8;
  --primary-mid: #F0D98A;
  --teal: #E8C85A;
  --teal-bg: #FFFDE8;
  --teal-mid: #F0D98A;
  --bg:#FFFEFA;--bg2:#FFFCE0;--bg3:#FFF8C2;
}

/* Dark Mode Variants */
@media(prefers-color-scheme:dark) {
  :root[data-theme="baby-blue"],
  :root {
    --primary: #6FD4C4;
    --primary-bg: #0D4D46;
    --primary-mid: #4AA098;
    --teal: #6FD4C4;
    --teal-bg: #0D4D46;
    --teal-mid: #4AA098;
  }

// ── Shopping helpers ──────────────────────────────────────────
function getShoppingItems(){
  const selected=RECIPES.filter(r=>ST.selectedRecipes.includes(r.id));
  const map={};
  selected.forEach(r=>r.ingredients.forEach(ing=>{
    const k=ing.name.toLowerCase();
    if(!map[k])map[k]={name:ing.name,qtys:[],recipes:[]};
    map[k].qtys.push(ing.qty);
    if(!map[k].recipes.includes(r.name))map[k].recipes.push(r.name);
  }));
  const cats={Produce:['apple','banana','mango','pear','avocado','spinach','broccoli','carrot','courgette','potato','sweet potato','tomato','cucumber','celery','onion','garlic','cauliflower','pea','parsnip','pepper','berries','strawberr','blueberr','lemon','lime'],Protein:['chicken','turkey','salmon','fish','beef','sardine','tuna','egg','mince'],Dairy:['milk','cheese','cheddar','butter','yogurt','ricotta','mozzarella','formula','cream'],Grains:['oat','pasta','rice','bread','flour','noodle','tortilla','breadcrumb','cereal'],Pantry:['lentil','bean','hummus','peanut butter','almond butter','soy sauce','oil','stock','passata','raisin','cinnamon','turmeric','cumin','herb','walnut','nut'],Other:[]};
  const grouped={Produce:[],Protein:[],Dairy:[],Grains:[],Pantry:[],Other:[]};
  Object.values(map).forEach(item=>{
    let placed=false;
    for(const[cat,kws]of Object.entries(cats)){
      if(cat==='Other')continue;
      if(kws.some(k=>item.name.toLowerCase().includes(k))){grouped[cat].push(item);placed=true;break;}
    }
    if(!placed)grouped.Other.push(item);
  });
  return grouped;
}

const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function updateBadge(){
  const b=document.getElementById('shop-badge');
  const bb=document.getElementById('btab-shop-badge');
  if(ST.selectedRecipes.length){
    if(b){b.textContent=ST.selectedRecipes.length;b.style.display='';}
    if(bb){bb.textContent=ST.selectedRecipes.length;bb.style.display='';}
  }else{
    if(b)b.style.display='none';
    if(bb)bb.style.display='none';
  }
}

function prefsCtx(){
  const p=ST.prefs,parts=[];
  if(p.favFoods.length)parts.push('loves: '+p.favFoods.join(', '));
  if(p.dislikedFoods.length)parts.push('dislikes: '+p.dislikedFoods.join(', '));
  if(p.favMealTypes.length)parts.push('preferred types: '+p.favMealTypes.join(', '));
  if(ST.avoidAllergens.length)parts.push('allergies/avoid: '+ST.avoidAllergens.join(', '));
  if(p.notes.trim())parts.push('notes: '+p.notes.trim());
  return parts.join('; ')||'no preferences set yet';
}

// ── Favorites system ─────────────────────────────────────────────
function toggleFavorite(id){
  if(ST.favorites.includes(id)){
    ST.favorites=ST.favorites.filter(f=>f!==id);
  }else{
    ST.favorites.push(id);
  }
  save();
  renderPage();
  updateFavoriteBadge();
}
function isFavorited(id){return ST.favorites.includes(id);}
function updateFavoriteBadge(){
  const b=document.getElementById('fav-badge');
  const bb=document.getElementById('btab-fav-badge');
  if(ST.favorites.length){
    if(b){b.textContent=ST.favorites.length;b.style.display='';}
    if(bb){bb.textContent=ST.favorites.length;bb.style.display='';}
  }else{
    if(b)b.style.display='none';
    if(bb)bb.style.display='none';
  }
}

// ── Meal Plan Management ──────────────────────────────────────────
function initMealPlan(){
  if(!ST.customMealPlan||!ST.customMealPlan.days||!ST.customMealPlan.days['Mon']){
    ST.customMealPlan={days:{},isCustom:false};
    ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>{
      ST.customMealPlan.days[d]={breakfast:null,lunch:null,dinner:null,snack:null};
    });
  }
}
function saveMealToPlan(day,slot,recipeId){
  initMealPlan();
  saveMealPlanHistory();
  const recipe=getAllRecipes().find(r=>r.id===recipeId);
  const slotLower=slot.toLowerCase();
  ST.customMealPlan.days[day][slotLower]={id:recipeId,name:recipe?.name||'Unknown'};
  ST.customMealPlan.isCustom=true;
  ST.unsavedMealChanges=true;
  save();
  renderPage();
}
function deleteMealFromPlan(day,slot){
  initMealPlan();
  saveMealPlanHistory();
  const slotLower=slot.toLowerCase();

// ── Claude API ────────────────────────────────────────────────
async function callClaude(messages, onChunk){
  if(!ST.apiKey)throw new Error('No API key');
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':ST.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:2048,
      system:`You are a friendly expert in baby and toddler nutrition. You help parents create personalised, safe, nutritious meal plans. You know the user's current context: ${prefsCtx()}. The child is ${ST.age==='baby'?'a baby aged 6–12 months':'a toddler aged 1–3 years'}. Keep responses concise and practical. When suggesting recipes from the app's library, mention them by name exactly. When listing a meal plan, use clear day-by-day formatting. Never recommend honey for babies under 1. Always flag any allergen concerns.`,
      messages,
      stream:true,
    })
  });
  if(!res.ok){const err=await res.json();throw new Error(err.error?.message||'API error');}
  const reader=res.body.getReader();
  const dec=new TextDecoder();
  let full='';
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    const chunk=dec.decode(value);
    for(const line of chunk.split('\n')){
      if(!line.startsWith('data:'))continue;
      const data=line.slice(5).trim();
      if(data==='[DONE]')break;
      try{
        const j=JSON.parse(data);
        if(j.type==='content_block_delta'&&j.delta?.text){
          full+=j.delta.text;
          if(onChunk)onChunk(full);
        }
      }catch(e){}
    }
  }
  return full;
}

function filtered(){
  const tab=ST.recipeTab||'all';
  const base=tab==='app'?RECIPES:tab==='added'?(ST.userRecipes||[]):getAllRecipes();
  return base.filter(r=>{
    if(r.age!==ST.age)return false;
    if(ST.avoidAllergens.length&&ST.avoidAllergens.some(a=>r.allergens.includes(a)))return false;
    if(ST.activeTypes.length&&!ST.activeTypes.includes(r.type))return false;
    if(ST.search){const q=ST.search.toLowerCase();if(!r.name.toLowerCase().includes(q)&&!r.desc.toLowerCase().includes(q)&&!r.type.toLowerCase().includes(q)&&!r.ingredients.some(i=>i.name.toLowerCase().includes(q)))return false;}
    return true;
  });
}

async function sendAI(text){
  if(!ST.apiKey){toast('Add your API key first');gotoPage('apikey');return;}
  ST.aiMessages.push({role:'user',content:text});
  save();
  renderPage();
  // Show streaming
  const streamEl=document.getElementById('ai-streaming');
  const streamText=document.getElementById('ai-stream-text');
  const sendBtn=document.getElementById('ai-send');
  const input=document.getElementById('ai-input');
  if(streamEl)streamEl.style.display='flex';
  if(sendBtn)sendBtn.disabled=true;
  if(input)input.disabled=true;
  // scroll to bottom
  const msgs=document.getElementById('ai-messages');
  if(msgs)msgs.scrollTop=msgs.scrollHeight;
  try{
    const history=ST.aiMessages.map(m=>({role:m.role,content:m.content}));
    let full='';
    await callClaude(history,(chunk)=>{
      full=chunk;
      if(streamText)streamText.innerHTML=formatAIText(esc(chunk));
      if(msgs)msgs.scrollTop=msgs.scrollHeight;
    });
    ST.aiMessages.push({role:'assistant',content:full});
    save();
    renderPage();
    // Check if Claude mentioned recipes we have — highlight them
    highlightAISuggestions(full);
  }catch(err){
    if(streamEl)streamEl.style.display='none';
    ST.aiMessages.push({role:'assistant',content:`Sorry, I couldn't connect to Claude. Error: ${err.message}\n\nPlease check your API key in Settings.`});
    save();
    renderPage();
  }
}

    ${[['plan','Week Plan','<rect x="1.5" y="3" width="13" height="11" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M1.5 6.5h13" stroke="currentColor" stroke-width="1.3"/><path d="M5 1.5v3M11 1.5v3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>'],['recipes','Recipes','<rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/>'],['favourites','Favourites','<path d="M8 2.5C5.5 2.5 3.5 4.3 3.5 6.5c0 3.5 4.5 7 4.5 7s4.5-3.5 4.5-7C12.5 4.3 10.5 2.5 8 2.5z" stroke="currentColor" stroke-width="1.3" fill="none"/>'],['shopping','Shopping','<path d="M2 2h1.5l2 8h7l1.5-5.5H5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="13" r="1" fill="currentColor"/><circle cx="11.5" cy="13" r="1" fill="currentColor"/>']].map(([id,label,svg])=>`
    <button onclick="ST.weekTab='${id}';save();renderPage()" style="background:none;border:none;cursor:pointer;padding:8px 14px;font-size:13px;font-weight:600;color:${wTab===id?'var(--teal)':'var(--text3)'};border-bottom:${wTab===id?'2px solid var(--teal)':'2px solid transparent'};margin-bottom:-0.5px;display:flex;align-items:center;gap:6px;font-family:inherit;white-space:nowrap;">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">${svg}</svg>${label}
    </button>`).join('')}
  </div>`;

  if(wTab==='recipes'){
    // ── Recipes tab ──
    const userCount=(ST.userRecipes||[]).filter(r=>r.age===ST.age).length;
    const appCount=RECIPES.filter(r=>r.age===ST.age).length;
    const rTab=ST.recipeTab||'all';
    const recipes=filtered();
    return header+`
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1rem;">
      <div class="recipe-tabs" style="margin:0;">
        <button class="recipe-tab${rTab==='all'?' active':''}" onclick="ST.recipeTab='all';save();renderPage()">All (${appCount+userCount})</button>
        <button class="recipe-tab${rTab==='app'?' active':''}" onclick="ST.recipeTab='app';save();renderPage()">App (${appCount})</button>
        <button class="recipe-tab${rTab==='added'?' active':''}" onclick="ST.recipeTab='added';save();renderPage()">Added (${userCount})</button>
      </div>
      <button class="btn btn-teal" onclick="openAddRecipeModal()" style="font-size:12px;padding:7px 14px;white-space:nowrap;">+ Add Recipe</button>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.4"/><path d="M11 11l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input class="search-input" id="search-inp" type="search" placeholder="Search recipes, ingredients…" value="${esc(ST.search||'')}" oninput="ST.search=this.value;save();clearTimeout(window._searchT);window._searchT=setTimeout(renderPage,220);">
      ${ST.search?`<button class="search-clear" onclick="ST.search='';save();renderPage()">×</button>`:''}
    </div>
    ${recipes.length===0?`<div class="no-results"><div style="font-size:36px;margin-bottom:12px;">🔍</div><div style="font-weight:600;margin-bottom:4px;">No recipes found</div><div>Try a different search or filter</div></div>`:`<div class="recipe-grid">${recipes.map(r=>renderCard(r,false)).join('')}</div>`}`;
  }

  if(wTab==='favourites'){
    // ── Favourites tab ──
    const favRecipes=getAllRecipes().filter(r=>ST.favorites.includes(r.id)&&r.age===ST.age);
    return header+(favRecipes.length===0?`<div style="text-align:center;padding:3rem 1rem;color:var(--text2);"><div style="font-size:48px;margin-bottom:12px;">❤️</div><div style="font-size:16px;font-weight:600;margin-bottom:6px;">No favourites yet</div><div style="font-size:13px;margin-bottom:1.5rem;">Tap the heart on any recipe to save it here</div><button class="btn btn-teal" onclick="ST.weekTab='recipes';save();renderPage()">Browse recipes</button></div>`:`<div class="recipe-grid">${favRecipes.map(r=>renderCard(r,false)).join('')}</div>`);
  }

  if(wTab==='shopping'){
    // ── Shopping tab ──
    return header+renderShoppingPage();
  }

  // ── Week Plan tab ──
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const slots=['Breakfast','Lunch','Dinner','Snack'];
  const recipes=getAllRecipes().filter(r=>r.age===ST.age&&!ST.avoidAllergens.some(a=>r.allergens.includes(a)));
  const byType={};
  slots.forEach(s=>{
    const m=recipes.filter(r=>{
      if(s==='Breakfast')return r.type==='Breakfast';
      if(s==='Lunch')return['Soup','Quick & easy','Finger food','Puree'].includes(r.type);
      if(s==='Dinner')return['Meat','Fish','Pasta','Vegetarian','Puree'].includes(r.type);
      return['Snack','Puree','Finger food'].includes(r.type);
    });
    byType[s]=m.length?m:recipes;
  });
  const wn=Math.floor(Date.now()/(7*24*60*60*1000));
  const pick=(arr,seed)=>arr[seed%arr.length];
  const slotIcon={Breakfast:'☀️',Lunch:'🌤️',Dinner:'🌙',Snack:'✨'};
  const tbd=ST.tinyBiteDays||{Mon:true,Tue:true,Wed:true,Thu:true,Fri:true,Sat:true,Sun:true};
  const dayFull=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const getMeal=(day,slot)=>{
    if(slot==='Snack'&&!tbd[day])return null;
    const customMeal=getMealFromPlan(day,slot);
    if(ST.customMealPlan.isCustom)return customMeal;
    if(customMeal)return customMeal;
    return pick(byType[slot],wn+slots.indexOf(slot)*7+days.indexOf(day)*13+slots.indexOf(slot)*3);
  };
  return header+`
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;">
    <button class="btn btn-teal" onclick="addWeekToList()" style="font-size:12px;padding:7px 14px;">🛒 Add week to list</button>
    ${ST.customMealPlan.isCustom?`<button class="btn" onclick="clearEntireWeek()" style="font-size:12px;padding:7px 12px;">Clear</button>`:''}
  </div>
  ${ST.apiKey?`<div class="ai-panel" style="margin-bottom:1.25rem;">
    <div class="ai-panel-header"><div class="ai-panel-title"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1l1.5 3 3.5.5-2.5 2.5.5 3.5L7 9l-3 1.5.5-3.5L2 4.5 5.5 4z" stroke="var(--purple)" stroke-width="1.2" fill="none" stroke-linejoin="round"/></svg>Generate with Claude</div></div>
    <div class="quick-chips" style="padding:12px 16px;">
      <span class="quick-chip" onclick="gotoPage('ai');setTimeout(()=>sendAI('Generate a personalised 7-day meal plan for my ${ST.age}. ${prefsCtx()}'),200)">✨ Personalised week</span>
      <span class="quick-chip" onclick="gotoPage('ai');setTimeout(()=>sendAI('What new foods should I introduce to my ${ST.age} this week?'),200)">New foods</span>
      <span class="quick-chip" onclick="gotoPage('ai');setTimeout(()=>sendAI('Create a batch cooking plan for my ${ST.age} for the week'),200)">Batch cook</span>
    </div>
  </div>`:`<div style="background:var(--purple-bg);border-radius:var(--r);padding:10px 14px;margin-bottom:1rem;font-size:12px;color:var(--purple);cursor:pointer;" onclick="gotoPage('apikey')">✨ Connect Claude for AI-personalised weekly plans →</div>`}
  <div class="planner-scroll">
    <div class="planner-grid">
      ${days.map((day,di)=>`<div class="planner-col">
        <div class="planner-day-head"><strong>${day}</strong>${dayFull[di]}</div>
        ${slots.map(slot=>{
          const isSnack=slot==='Snack';
          if(isSnack&&!tbd[day])return`<div class="planner-card snack-off" onclick="toggleTinyBiteDay('${day}')"><div class="planner-slot-label snack">${slotIcon[slot]} ${slot}</div><div class="planner-empty" style="padding:4px 0;font-size:10px;">Off · tap on</div></div>`;
          const r=getMeal(day,slot);
          return`<div class="planner-card ${slot.toLowerCase()}${r?' draggable-cell':''}" data-day="${day}" data-slot="${slot}" draggable="${r?'true':'false'}" ondragstart="weekDragStart(event,'${day}','${slot}')" ondragover="weekDragOver(event)" ondrop="weekDrop(event,'${day}','${slot}')" ondragleave="this.classList.remove('drag-over')" ontouchstart="weekTouchStart(event,'${day}','${slot}')">
            <div class="planner-slot-label ${slot.toLowerCase()}">${slotIcon[slot]} ${slot}</div>
            ${r?`<div class="planner-emoji" onclick="openRecipe(${r.id})" style="cursor:pointer;">${r.emoji}</div>
            <div class="planner-name" onclick="openRecipe(${r.id})" style="cursor:pointer;">${esc(r.name)}</div>
            <div class="planner-meta">${r.time<60?r.time+'m':Math.round(r.time/60)+'h'} · ${r.cal}kcal</div>
            <button class="planner-swap" onclick="event.stopPropagation();openMealSelector('${day}','${slot}')">🔍 swap</button>
            <div class="planner-actions"><button class="planner-btn" onclick="event.stopPropagation();openDeleteMealConfirm('${day}','${slot}','${esc(r.name)}')">×</button></div>`
            :`<div class="planner-empty" onclick="openMealSelector('${day}','${slot}')">+ add meal</div>`}
          </div>`;
        }).join('')}
      </div>`).join('')}
    </div>
  </div>
  <div style="margin-top:10px;font-size:11px;color:var(--text3);text-align:center;font-family:'DM Sans',sans-serif;">✦ Drag cards to swap · Snack days toggleable in Preferences</div>`;
}

    <div class="page-title">Shopping list</div>

  </div>
  ${selected.length?`<div class="selected-recipes-bar"><div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">Recipes included</div>${selected.map(r=>`<span class="selected-recipe-chip">${r.emoji} ${r.name} <button onclick="toggleRecipe(${r.id})">×</button></span>`).join('')}</div>`:''}

  ${ST.apiKey?`<div style="margin-bottom:1rem;">
    <span class="quick-chip" style="cursor:pointer;" onclick="gotoPage('ai');setTimeout(()=>sendAI('I have these ingredients: ${Object.values(grouped).flat().map(i=>i.name).join(', ')}. Can you suggest extra meals I can make for my ${ST.age}?'),200)">✨ Ask Claude for meal ideas with these ingredients</span>

        <div class="shop-check${done?' done':''}">
          ${done?`<svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2.5 2.5L8 2" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`:''}
        </div>
        <div class="shop-item-name">${esc(i.name)}</div>

    <div style="font-size:40px;margin-bottom:10px;">🛒</div>

    <div style="font-size:13px;margin-bottom:1.25rem;">Add recipes from Discover or Weekly plan</div>
    <button class="btn btn-teal" onclick="gotoPage('discover')">Browse recipes</button>
  </div>`}`;
}

function renderNutritionPage(){
  const selected=RECIPES.filter(r=>ST.selectedRecipes.includes(r.id));
  const pool=selected.length?selected:RECIPES.filter(r=>r.age===ST.age);
  const avg=k=>pool.length?Math.round(pool.reduce((s,r)=>s+r[k],0)/pool.length):0;
  const targets=ST.age==='baby'?{cal:500,carbs:60,protein:11,fat:30}:{cal:1000,carbs:130,protein:13,fat:35};
  const barColors={cal:'#0F6E56',carbs:'#854F0B',protein:'#534AB7',fat:'#993C1D'};
  const tips=ST.age==='baby'?['Iron-rich foods (lentils, meat, fortified cereals) are critical from 6 months.','Introduce one new food every 2–3 days to spot reactions.','Breast milk or formula remains primary until 12 months.','Avoid honey, whole nuts, added salt and sugar.','Vitamin D supplementation is recommended for breastfed babies.']:['3 meals and 2 snacks a day is the ideal pattern.','Full-fat dairy supports brain development until age 2.','Offer new foods repeatedly — 15+ exposures before acceptance is normal.','Limit fruit juice; offer water and full-fat milk.','Iron needs remain high — red meat, lentils or fortified foods regularly.'];
  return`<div class="page-header"><div class="page-title">Nutrition</div><div class="page-sub">${selected.length?`Average across ${selected.length} selected recipes`:`Average across all ${ST.age} recipes`}</div></div>
  <div class="nutr-big-grid">
    ${[['Calories','cal','kcal'],['Carbohydrates','carbs','g'],['Protein','protein','g'],['Fat','fat','g']].map(([label,key,unit])=>`<div class="nutr-big-card">
      <div class="nutr-big-label">${label}</div>
      <div class="nutr-big-val">${avg(key)}<span class="nutr-big-unit"> ${unit}</span></div>
      <div class="nutr-big-target">Target: ${targets[key]}${unit}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,Math.round(avg(key)/targets[key]*100))}%;background:${barColors[key]};"></div></div>
    </div>`).join('')}
  </div>
  <div class="tips-card"><div class="tips-title">Tips for ${ST.age==='baby'?'babies':'toddlers'}</div>${tips.map(t=>`<div class="tip-item"><div class="tip-dot"></div><div>${t}</div></div>`).join('')}</div>
  ${ST.apiKey?`<button class="btn btn-purple" onclick="gotoPage('ai');setTimeout(()=>sendAI('Give me a detailed nutrition guide for my ${ST.age}. My context: ${prefsCtx()}'),200)">✨ Ask Claude for personalised nutrition advice</button>`:''}`;
}

  const themeLabels={'baby-blue':'Baby Blue','baby-pink':'Baby Pink','baby-orange':'Baby Orange','baby-green':'Baby Green','baby-purple':'Baby Purple','baby-yellow':'Baby Yellow'};
  return`<div class="page-header"><div class="page-title">Preferences</div><div class="page-sub">Used by Claude AI across the app</div></div>
  <div class="pref-grid">
    <div class="pref-card pref-card-full">
      <div class="pref-card-title">Theme</div><div class="pref-card-sub">Choose your preferred color palette</div>
      <div class="theme-grid">${themes.map(t=>`<div class="theme-swatch${ST.theme===t?' active':''}" onclick="applyTheme('${t}')" tabindex="0"><div class="theme-circle" style="background-color:${getThemeColor(t,'primary')}"></div><div class="theme-label">${themeLabels[t]}</div>${ST.theme===t?'<div class="theme-check">✓</div>':''}</div>`).join('')}</div>
    </div>
    <div class="pref-card">
      <div class="pref-card-title">Favourite foods</div><div class="pref-card-sub">Claude will suggest these more often</div>

      <div class="input-row"><input class="pref-input" id="fav-in" type="text" placeholder="e.g. sweet potato, mango…" onkeydown="if(event.key==='Enter')addPref('favFoods','fav-in')"/><button class="btn" onclick="addPref('favFoods','fav-in')">Add</button></div>

      <div class="input-row"><input class="pref-input" id="dis-in" type="text" placeholder="e.g. broccoli, peas…" onkeydown="if(event.key==='Enter')addPref('dislikedFoods','dis-in')"/><button class="btn" onclick="addPref('dislikedFoods','dis-in')">Add</button></div>
    </div>
    <div class="pref-card pref-card-full">
      <div class="pref-card-title">Preferred meal types</div><div class="pref-card-sub">Claude will prioritise these in suggestions</div>
      <div class="meal-type-grid">${MEAL_TYPES.map(t=>`<span class="mt-pill${p.favMealTypes.includes(t)?' active':''}" onclick="togglePrefType('${t}')">${p.favMealTypes.includes(t)?'✓ ':''}${t}</span>`).join('')}</div>
    </div>
    <div class="pref-card pref-card-full">
      <div class="pref-card-title">✨ Snack days</div><div class="pref-card-sub">Choose which days include a snack in the weekly plan</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:8px;">
        ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>{const on=(ST.tinyBiteDays||{})[d]!==false;return`<div style="text-align:center;"><div style="font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:600;">${d}</div><div onclick="toggleTinyBiteDay('${d}')" style="width:36px;height:20px;border-radius:20px;background:${on?'var(--teal)':'var(--bg3)'};margin:0 auto;position:relative;cursor:pointer;transition:background .2s;"><div style="position:absolute;top:2px;left:${on?'18':'2'}px;width:16px;height:16px;border-radius:50%;background:white;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);"></div></div></div>`;}).join('')}
      </div>
    </div>
    <div class="pref-card">
      <div class="pref-card-title">Auto-regenerate weekly menu</div><div class="pref-card-sub">Automatically generate a fresh meal plan on a chosen day each week</div>
      <select class="pref-select" onchange="ST.prefs.regenerateDay=this.value;save();toast(this.value?'Will auto-regenerate on '+this.value+'s':'Auto-regenerate disabled')">
        <option value="" ${!p.regenerateDay?'selected':''}>Off — manual only</option>
        ${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(d=>`<option value="${d}" ${p.regenerateDay===d?'selected':''}>${d}</option>`).join('')}

    <div class="pref-card pref-card-full">
      <div class="pref-card-title">Additional notes</div><div class="pref-card-sub">Texture stage, feeding style, baby's age, anything for Claude to know</div>

}

// ── Actions ───────────────────────────────────────────────────
function toggleAllergen(a){const i=ST.avoidAllergens.indexOf(a);i>-1?ST.avoidAllergens.splice(i,1):ST.avoidAllergens.push(a);save();renderPage();}
function toggleType(t){const i=ST.activeTypes.indexOf(t);i>-1?ST.activeTypes.splice(i,1):ST.activeTypes.push(t);save();renderPage();}
function toggleRecipe(id){const i=ST.selectedRecipes.indexOf(id);if(i>-1){ST.selectedRecipes.splice(i,1);}else{ST.selectedRecipes.push(id);toast('Added to shopping list');}updateBadge();save();renderPage();}
function toggleShopItem(id){const i=ST.shopChecked.indexOf(id);i>-1?ST.shopChecked.splice(i,1):ST.shopChecked.push(id);save();renderPage();}
function setAge(a){ST.age=a;document.getElementById('age-baby').className='age-pill'+(a==='baby'?' active-baby':'');document.getElementById('age-toddler').className='age-pill'+(a==='toddler'?' active-toddler':'');save();renderPage();}
function addPref(key,inputId){const inp=document.getElementById(inputId);const val=inp.value.trim();if(val&&!ST.prefs[key].includes(val)){ST.prefs[key].push(val);inp.value='';save();renderPage();}}
function removePref(key,i){ST.prefs[key].splice(i,1);save();renderPage();}
function togglePrefType(t){const i=ST.prefs.favMealTypes.indexOf(t);i>-1?ST.prefs.favMealTypes.splice(i,1):ST.prefs.favMealTypes.push(t);save();renderPage();}

async function saveApiKey(){
  const inp=document.getElementById('api-key-input');
  const key=inp?inp.value.trim():'';
  if(!key){toast('Please enter an API key');return;}
  const btn=document.querySelector('.setup-btn');
  if(btn){btn.textContent='Verifying…';btn.disabled=true;}
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:10,messages:[{role:'user',content:'hi'}]})
    });
    if(res.ok||res.status===400){
      ST.apiKey=key;save();updateAIStatus();toast('Claude connected! ✓');gotoPage('ai');
    }else{
      const err=await res.json();toast('Invalid key: '+(err.error?.message||'unknown error'));
      if(btn){btn.textContent='Connect Claude';btn.disabled=false;}
    }
  }catch(e){
    // If CORS etc, just trust the key and save
    ST.apiKey=key;save();updateAIStatus();toast('Key saved — try sending a message to verify');gotoPage('ai');
  }
}

function addWeekToList(){
  const slots=['Breakfast','Lunch','Dinner','Snack'];
  const all=RECIPES.filter(r=>r.age===ST.age&&!ST.avoidAllergens.some(a=>r.allergens.includes(a)));
  const wn=Math.floor(Date.now()/(7*24*60*60*1000));
  const byType={};
  slots.forEach(s=>{const m=all.filter(r=>{if(s==='Breakfast')return r.type==='Breakfast';if(s==='Lunch')return['Soup','Quick & easy','Finger food','Puree'].includes(r.type);if(s==='Dinner')return['Meat','Fish','Pasta','Vegetarian','Puree'].includes(r.type);return['Snack','Puree','Finger food'].includes(r.type);});byType[s]=m.length?m:all;});
  const added=new Set();
  slots.forEach((slot,si)=>{for(let di=0;di<7;di++){const pool=byType[slot];const r=pool[(wn+si*7+di*13+si*3)%pool.length];added.add(r.id);}});
  added.forEach(id=>{if(!ST.selectedRecipes.includes(id))ST.selectedRecipes.push(id);});
  updateBadge();save();toast("Week's recipes added to list");gotoPage('shopping');
}

function buildListText(){
  const g=getShoppingItems();
  return Object.entries(g).filter(([,items])=>items.length).map(([cat,items])=>`${cat}:\n${items.map(i=>`• ${i.name} — ${i.qtys.join(', ')}`).join('\n')}`).join('\n\n');
}
function exportKeep(){const text=buildListText();window.open(`https://keep.google.com/#NOTE&title=${encodeURIComponent('Tiny Bites Shopping List')}&text=${encodeURIComponent(text)}`,'_blank');toast('Opening Google Keep…');}
function exportIOS(){
  const grouped=getShoppingItems();const items=Object.values(grouped).flat();
  if(/iPad|iPhone|iPod/.test(navigator.userAgent)){items.forEach((item,i)=>setTimeout(()=>{window.location=`x-apple-reminderkit://REMCDReminder/?name=${encodeURIComponent(item.name+' — '+item.qtys.join(', '))}`;},i*200));toast('Opening iOS Reminders…');}
  else{const blob=new Blob([`Tiny Bites Shopping List\n${'─'.repeat(30)}\n\n${buildListText()}`],{type:'text/plain'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='tiny-bites-shopping.txt';a.click();toast('Saved as text file');}
}

function openMealSelector(day,slot){
  const slotColor={Breakfast:'#854F0B',Lunch:'var(--teal)',Dinner:'#3C3489',Snack:'#C2415A'};
  const slotIcon={Breakfast:'☀️',Lunch:'🌤️',Dinner:'🌙',Snack:'✨'};
  const allR=getAllRecipes().filter(r=>r.age===ST.age&&!ST.avoidAllergens.some(a=>r.allergens.includes(a)));
  const current=getMealFromPlan(day,slot);
  window._mealSelDay=day;window._mealSelSlot=slot;window._mealSelAll=allR;window._mealSelTags=[];
  const renderMealList=()=>{
    const nameQ=(document.getElementById('meal-sel-name')?.value||'').toLowerCase();
    const tags=window._mealSelTags||[];
    let pool=allR.filter(r=>{
      if(nameQ&&!r.name.toLowerCase().includes(nameQ))return false;
      if(tags.length>0&&!tags.every(t=>(r.ingredients||[]).some(i=>i.name?.toLowerCase().includes(t)||i.toLowerCase?.()?.includes(t))))return false;
      return true;
    });
    if(tags.length>0){
      pool=[...pool].sort((a,b)=>{
        const sa=tags.filter(t=>(a.ingredients||[]).some(i=>(i.name||i).toLowerCase().includes(t))).length;
        const sb=tags.filter(t=>(b.ingredients||[]).some(i=>(i.name||i).toLowerCase().includes(t))).length;
        return sb-sa;
      });
    }
    const el=document.getElementById('meal-sel-list');
    if(!el)return;
    el.innerHTML=pool.length===0?`<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px;">No recipes match — try different filters</div>`:
    pool.map(r=>{
      const isCur=current?.id===r.id;
      const ings=(r.ingredients||[]).map(i=>typeof i==='string'?i:i.name||'');
      const matched=tags.length>0?ings.filter(i=>tags.some(t=>i.toLowerCase().includes(t))):[];
      return`<div class="meal-sel-item${isCur?' current':''}" onclick="saveMealToPlan('${day}','${slot}',${r.id});document.getElementById('modal-overlay').style.display='none';document.body.style.overflow='';">
        <span class="meal-sel-emoji">${r.emoji}</span>
        <div class="meal-sel-info">
          <div class="meal-sel-name">${esc(r.name)}${isCur?` <span style="font-size:9px;background:var(--teal-bg);color:var(--teal);padding:1px 7px;border-radius:20px;font-weight:700;">current</span>`:''}</div>
          <div class="meal-sel-meta">${r.time<60?r.time+'m':Math.round(r.time/60)+'h'} · ${r.cal}kcal · ${r.type}</div>
          ${ings.length>0?`<div class="meal-sel-ings">${ings.slice(0,6).map(i=>`<span class="meal-sel-ing${matched.includes(i)?' matched':''}">${esc(i)}</span>`).join('')}${ings.length>6?`<span class="meal-sel-ing">+${ings.length-6}</span>`:''}</div>`:''}
        </div>
        <span style="color:var(--text3);opacity:.4;">›</span>
      </div>`;
    }).join('');
  };
  document.getElementById('modal-content').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
      <div>
        <div style="font-size:10px;font-family:'DM Sans',sans-serif;letter-spacing:2px;text-transform:uppercase;color:${slotColor[slot]||'var(--teal)'};margin-bottom:3px;">${slotIcon[slot]||''} ${slot} · ${day}</div>
        <div class="modal-title">Select a meal</div>
      </div>
      <button onclick="document.getElementById('modal-overlay').style.display='none';document.body.style.overflow='';" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);padding:0 4px;">✕</button>
    </div>
    <input type="text" id="meal-sel-name" placeholder="Search by name…" style="width:100%;margin-bottom:10px;" oninput="(()=>{const t=window._mealSelTags||[];window._mealSelTags=t;(${renderMealList.toString()})()})()">
    <div style="font-size:11px;font-family:'DM Sans',sans-serif;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;">Filter by ingredients</div>
    <div id="meal-ing-wrap" class="ing-tags-wrap" onclick="document.getElementById('meal-ing-inp').focus()">
      <input id="meal-ing-inp" class="ing-tag-input" placeholder="Type ingredient, press Enter…"
        onkeydown="if(event.key==='Enter'||event.key===','){event.preventDefault();const v=this.value.trim().toLowerCase();if(v&&!(window._mealSelTags||[]).includes(v)){window._mealSelTags=[...(window._mealSelTags||[]),v];this.value='';mealSelRenderTags();(${renderMealList.toString()})();}}" />
    </div>
    <div id="meal-sel-list" style="max-height:360px;overflow-y:auto;margin-top:12px;"></div>
  `;
  window.mealSelRenderTags=()=>{
    const wrap=document.getElementById('meal-ing-wrap');
    if(!wrap)return;
    const tags=window._mealSelTags||[];
    const inp=document.getElementById('meal-ing-inp');
    wrap.innerHTML='';
    tags.forEach((t,i)=>{
      const chip=document.createElement('span');chip.className='ing-tag';
      chip.innerHTML=`${t}<button onclick="window._mealSelTags.splice(${i},1);window.mealSelRenderTags();(${renderMealList.toString()})()">✕</button>`;
      wrap.appendChild(chip);
    });
    if(inp){wrap.appendChild(inp);inp.focus();}
    else{const ni=document.createElement('input');ni.id='meal-ing-inp';ni.className='ing-tag-input';ni.placeholder=tags.length===0?'Type ingredient, press Enter…':'';ni.onkeydown=function(event){if(event.key==='Enter'||event.key===','){event.preventDefault();const v=this.value.trim().toLowerCase();if(v&&!(window._mealSelTags||[]).includes(v)){window._mealSelTags=[...(window._mealSelTags||[]),v];this.value='';window.mealSelRenderTags();(renderMealList)();}}};wrap.appendChild(ni);}
  };
  renderMealList();
  document.getElementById('modal-overlay').style.display='flex';
  document.body.style.overflow='hidden';
}

function checkAutoRegenerate(){
  const day=ST.prefs?.regenerateDay;
  if(!day)return;
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const todayName=days[new Date().getDay()];
  if(todayName!==day)return;
  const todayDate=new Date();todayDate.setHours(0,0,0,0);

  if((ST.prefs.lastRegenDate||0)>=todayMs)return;

  ST.prefs.lastRegenDate=todayMs;
  save();
  toast('Weekly menu auto-regenerated for '+day+'!');
}

// ── Drag & Drop (week cells) ──────────────────────────────────
let _dragSrc=null;
function weekDragStart(e,day,slot){
  _dragSrc={day,slot};
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.style.opacity='0.5';
}
function weekDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function weekDrop(e,day,slot){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!_dragSrc||(_dragSrc.day===day&&_dragSrc.slot===slot))return;
  initMealPlan();
  saveMealPlanHistory();
  const src=ST.customMealPlan.days[_dragSrc.day][_dragSrc.slot.toLowerCase()];
  const dst=ST.customMealPlan.days[day][slot.toLowerCase()];
  // Need to resolve auto-generated meals for drag if not custom yet
  if(!ST.customMealPlan.isCustom){
    const days2=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const slots2=['Breakfast','Lunch','Dinner','Snack'];
    const recipes2=getAllRecipes().filter(r=>r.age===ST.age&&!ST.avoidAllergens.some(a=>r.allergens.includes(a)));
    const byType2={};
    slots2.forEach(s=>{const m=recipes2.filter(r=>{if(s==='Breakfast')return r.type==='Breakfast';if(s==='Lunch')return['Soup','Quick & easy','Finger food','Puree'].includes(r.type);if(s==='Dinner')return['Meat','Fish','Pasta','Vegetarian','Puree'].includes(r.type);return['Snack','Puree','Finger food'].includes(r.type);});byType2[s]=m.length?m:recipes2;});
    const wn=Math.floor(Date.now()/(7*24*60*60*1000));
    const pick2=(arr,seed)=>arr[seed%arr.length];
    days2.forEach(d=>{slots2.forEach(s=>{if(!ST.customMealPlan.days[d][s.toLowerCase()]){const r=pick2(byType2[s],wn+slots2.indexOf(s)*7+days2.indexOf(d)*13+slots2.indexOf(s)*3);if(r)ST.customMealPlan.days[d][s.toLowerCase()]={id:r.id,name:r.name};}});});
  }
  const srcVal=ST.customMealPlan.days[_dragSrc.day][_dragSrc.slot.toLowerCase()];
  const dstVal=ST.customMealPlan.days[day][slot.toLowerCase()];
  ST.customMealPlan.days[_dragSrc.day][_dragSrc.slot.toLowerCase()]=dstVal;
  ST.customMealPlan.days[day][slot.toLowerCase()]=srcVal;
  ST.customMealPlan.isCustom=true;
  ST.unsavedMealChanges=true;
  _dragSrc=null;
  save();
  renderPage();
}
// Touch drag support
let _touchSrc=null,_touchEl=null,_touchClone=null;
function weekTouchStart(e,day,slot){
  const r=getMealFromPlan(day,slot);
  if(!r&&!ST.customMealPlan.isCustom)return;
  _touchSrc={day,slot};
  _touchEl=e.currentTarget;
  let moved=false;
  const onMove=(ev)=>{
    moved=true;
    const t=ev.touches[0];
    if(!_touchClone){
      _touchClone=_touchEl.cloneNode(true);
      _touchClone.style.cssText='position:fixed;opacity:0.8;pointer-events:none;z-index:9999;width:'+_touchEl.offsetWidth+'px;';
      document.body.appendChild(_touchClone);
    }
    _touchClone.style.left=(t.clientX-_touchEl.offsetWidth/2)+'px';
    _touchClone.style.top=(t.clientY-20)+'px';
    const el=document.elementFromPoint(t.clientX,t.clientY);
    document.querySelectorAll('.week-cell').forEach(c=>c.classList.remove('drag-over'));
    if(el){const cell=el.closest('.week-cell');if(cell)cell.classList.add('drag-over');}
  };
  const onEnd=(ev)=>{
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);
    if(_touchClone){_touchClone.remove();_touchClone=null;}
    document.querySelectorAll('.week-cell').forEach(c=>c.classList.remove('drag-over'));
    if(moved&&ev.changedTouches[0]){
      const t=ev.changedTouches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      if(el){const cell=el.closest('[data-day]');if(cell){const td=cell.dataset.day,ts=cell.dataset.slot;if(td&&ts)weekDrop({preventDefault:()=>{}},td,ts);}}
    }
    _touchSrc=null;
  };
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd);
}

// ── Router ────────────────────────────────────────────────────
function gotoPage(page){
  ST.page=page;
  ['home','favorites','ai','week','shopping','nutrition','prefs','apikey'].forEach(id=>{
    const el=document.getElementById('nav-'+id);if(el)el.className='nav-item'+(id===page?' active':'');
  });
  // Update bottom tab bar active state
  ['home','week','favorites','shopping'].forEach(id=>{
    const el=document.getElementById('btab-'+id);
    if(el)el.className='bottom-tab'+(id===page?' active':'');
  });
  save();renderPage();window.scrollTo(0,0);
}

function renderPage(){
  const el=document.getElementById('main-content');
  // Preserve search input focus & cursor before re-render
  const searchEl=document.getElementById('search-inp');
  const hadFocus=searchEl&&document.activeElement===searchEl;
  const cursorPos=hadFocus?searchEl.selectionStart:null;
  if(ST.page==='home')el.innerHTML=renderHomePage();
  else if(ST.page==='favorites')el.innerHTML=renderFavoritesPage();
  else if(ST.page==='ai')el.innerHTML=renderAIPage();
  else if(ST.page==='week')el.innerHTML=renderWeekPage();
  else if(ST.page==='shopping')el.innerHTML=renderShoppingPage();
  else if(ST.page==='nutrition')el.innerHTML=renderNutritionPage();
  else if(ST.page==='prefs')el.innerHTML=renderPrefsPage();
  else if(ST.page==='apikey')el.innerHTML=renderApiKeyPage();
  // Restore focus & cursor to search input after re-render
  if(hadFocus){const s=document.getElementById('search-inp');if(s){s.focus();try{s.setSelectionRange(cursorPos,cursorPos);}catch(e){}}}
  updateBadge();updateFavoriteBadge();updateAIStatus();
}
